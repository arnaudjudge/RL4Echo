work_dir: ${hydra:runtime.cwd}
run_name: sector_enet_default

logger_run_name: '${get_class_name: ${model._target_}}_${run_name}'

defaults:
  - logger: comet
  - model: supervised_enet
  - datamodule: supervised_sector
  - callbacks: default
  - _self_

seed: 1

callbacks:
  model_checkpoint:
    monitor: val_dice

train: True

trainer:
  _target_: lightning.pytorch.Trainer
  max_epochs: 50
  log_every_n_steps: 1
  accelerator: gpu
  devices: 1
  limit_train_batches: 1000
  accumulate_grad_batches: 64
  #num_sanity_val_steps: 0 # skip sanity check (convenient for debugging directly in train step)
